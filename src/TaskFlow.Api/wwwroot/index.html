<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
    <div id="app"></div>
    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
    <script>
        window.addEventListener("error", function (event) {
            var app = document.getElementById("app");
            if (!app || app.children.length) {
                return;
            }

            app.innerHTML = "<section style=\"min-height:100vh;display:grid;place-items:center;padding:24px;\"><div style=\"max-width:720px;padding:24px;border:1px solid rgba(0,0,0,.1);border-radius:20px;background:rgba(255,255,255,.9);font-family:Segoe UI,Arial,sans-serif;\"><h1 style=\"margin-top:0;\">Client error</h1><pre style=\"white-space:pre-wrap;margin:0;\">" + String(event.message || "Unknown error") + "</pre></div></section>";
        });
    </script>
    <script type="module" src="/assets/app.js"></script>
</body>
</html>
